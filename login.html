<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Okene Lumen</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
      <img src="okene3.png" alt="Okene Lumen Logo">
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#products">Products</a></li>
      <li><a href="#">About</a></li>
    </ul>
    <div class="cart-icon">
      <img src="okene10.png" alt="Shopping Cart">
      <span id="cart-count">0</span>
    </div>
  </nav>

  <!-- LOGIN FORM -->
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-header">
        <h1>Welcome Back 🌾</h1>
        <p>Log in to view your orders and shop fresh produce</p>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="e.g. amina@email.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="login-password" placeholder="Your password">
          <button class="toggle-password" data-target="login-password">👁</button>
        </div>
      </div>

      <p class="auth-error" id="login-error"></p>

      <button class="btn auth-btn" id="login-btn">Log In</button>

      <p class="auth-switch">
        Don't have an account? <a href="signup.html">Sign up here</a>
      </p>

    </div>
  </div>
<script src="navbar.js"></script>
<script src="auth.js"></script>
 
</body>
</html>
