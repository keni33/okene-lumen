<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - Okene Lumen</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="product.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
      <img src="okene3.png" alt="Okene Lumen Logo">
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#products">Products</a></li>
      <li><a href="#">About</a></li>
    </ul>
    <div class="cart-icon">
      <img src="okene10.png" alt="Shopping Cart">
      <span id="cart-count">0</span>
    </div>
  </nav>

  <!-- BACK BUTTON -->
  <div class="back-bar">
    <a href="index.html" class="back-btn">&#8592; Back to Products</a>
  </div>

  <!-- PRODUCT DETAIL — all filled by product.js -->
  <section class="product-detail">

    <div class="detail-image">
      <img src="" alt="" id="main-product-image">
    </div>

    <div class="detail-info">

      <p class="detail-category" id="detail-category"></p>
      <h1 class="detail-name" id="detail-name"></h1>
      <p class="detail-description" id="detail-description"></p>

      <div class="price-block">
        <span class="detail-price" id="product-price"></span>
        <span class="per-unit" id="per-unit"></span>
      </div>

      <p class="stock-info" id="stock-info"></p>

      <div class="size-section">
        <p class="section-label">Select a Standard Quantity</p>
        <div class="size-options" id="size-options">
          <!-- filled by product.js -->
        </div>
      </div>

      <div class="custom-section">
        <p class="section-label">Or Enter a Custom Quantity</p>
        <div class="custom-input-row">
          <input
            type="number"
            id="custom-quantity"
            class="custom-input"
            placeholder="e.g. 3.5"
            min="0.1"
            step="0.1"
          >
          <select id="custom-unit" class="unit-select">
            <option value="kg">kg</option>
            <option value="litre">litre</option>
            <option value="bunch">bunch</option>
            <option value="crate">crate</option>
            <option value="tuber">tuber</option>
            <option value="bulb">bulb</option>
            <option value="jar">jar</option>
          </select>
        </div>
        <p class="error-msg" id="input-error"></p>
      </div>

      <div class="total-block">
        <p class="section-label">Total Price</p>
        <p class="total-price" id="total-price"></p>
      </div>

      <div class="action-buttons">
        <button class="btn" id="add-to-cart-btn">Add to Cart</button>
        <button class="btn btn-outline" id="send-request-btn">
          Send Custom Request to Farmer
        </button>
      </div>

    </div>
  </section>

 <script src="products.js"></script>
<script src="navbar.js"></script>
<script src="product.js"></script>
</body>
</html>
