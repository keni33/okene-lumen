<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okene-lumen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
      <img src="okene3.png" alt="Okene Lumen Logo">
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#products">Products</a></li>
      <li><a href="#">About</a></li>
    </ul>
    <div class="cart-icon">
      <img src="okene10.png" alt="Shopping Cart">
      <span id="cart-count">0</span>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <img src="okene5.png" alt="A picture of a farm" class="hero-image">
    <div class="hero-overlay">
      <h1>Fresh From the Farm</h1>
      <p>Organic Produce delivered straight to your doorstep</p>
      <a href="#products" class="btn">Shop Now</a>
    </div>
  </section>

  <!-- PRODUCTS -->
  <section id="products" class="products">
    <h2>Our Products</h2>
    <div class="product-grid" id="product-grid">
      <!-- All cards generated automatically by script.js -->
    </div>
  </section>

  <script src="products.js"></script>
<script src="navbar.js"></script>
<script src="script.js"></script>
</body>
</html>
